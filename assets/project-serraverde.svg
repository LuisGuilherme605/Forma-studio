<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Embalagem e branding da Serra Verde Cosméticos">
  <defs>
    <linearGradient id="serraBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1F2E1F"/>
      <stop offset="1" stop-color="#121C12"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#97C459" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#5E8A38" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#serraBg)"/>
  <!-- montanhas -->
  <polygon points="0,600 220,300 380,600" fill="#97C459" fill-opacity="0.12"/>
  <polygon points="240,600 480,260 720,600" fill="#97C459" fill-opacity="0.18"/>
  <polygon points="520,600 700,360 800,500 800,600" fill="#97C459" fill-opacity="0.1"/>
  <!-- frasco de cosmético -->
  <rect x="330" y="200" width="140" height="280" rx="20" fill="url(#bottle)" stroke="#C8A96E" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="372" y="160" width="56" height="50" rx="8" fill="#C8A96E" fill-opacity="0.4"/>
  <rect x="360" y="290" width="80" height="110" rx="8" fill="#FDFBF7" fill-opacity="0.06" stroke="#E8D9B8" stroke-opacity="0.3"/>
  <circle cx="400" cy="320" r="18" fill="none" stroke="#97C459" stroke-opacity="0.7"/>
  <path d="M400 312 C 392 320, 392 332, 400 340 C 408 332, 408 320, 400 312 Z" fill="#97C459" fill-opacity="0.7"/>
  <text x="400" y="378" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="11" letter-spacing="3" fill="#E8D9B8">SERRA VERDE</text>
  <circle cx="600" cy="150" r="40" fill="none" stroke="#C8A96E" stroke-opacity="0.3"/>
</svg>
